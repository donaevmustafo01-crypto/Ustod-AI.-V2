<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>UstodAI — Устоди Ҳушманд</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0F0A1E;color:#fff;max-width:480px;margin:0 auto;min-height:100vh}
::-webkit-scrollbar{display:none}
.page{display:none;padding-bottom:80px;min-height:100vh}
.page.active{display:block}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1A1030;border-top:1px solid #2D1B69;display:flex;padding:8px 0 12px;z-index:999}
.nav-btn{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;font-family:inherit}
.nav-ico{font-size:20px}
.nav-lbl{font-size:9px;font-weight:800;color:#4B5563}
.nav-btn.active .nav-lbl{color:#8B5CF6}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#8B5CF6;margin:0 auto}
.header{background:linear-gradient(135deg,#1E0A3C,#2D1B69,#3730A3);padding:20px 16px 24px;overflow:hidden}
.card{background:#1A1030;border-radius:20px;padding:16px;margin-bottom:12px;border:1px solid #2D1B69}
.btn{width:100%;border:none;border-radius:14px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-p{background:linear-gradient(135deg,#6D28D9,#7C3AED);color:#fff}
.btn-o{background:transparent;border:2px solid #7C3AED;color:#8B5CF6}
.finput{width:100%;background:#1A1030;border:1.5px solid #2D1B69;border-radius:12px;padding:13px 14px;font-size:14px;font-family:inherit;outline:none;color:#fff;margin-bottom:12px}
.finput:focus{border-color:#7C3AED}
.msg{max-width:85%;border-radius:16px;padding:12px 14px;font-size:13px;line-height:1.6;margin-bottom:10px}
.msg.user{background:linear-gradient(135deg,#6D28D9,#7C3AED);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg.ai{background:#1A1030;border:1px solid #2D1B69;color:#E5E7EB;border-bottom-left-radius:4px}
.chip{flex-shrink:0;border:1.5px solid #2D1B69;border-radius:20px;padding:7px 14px;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;background:transparent;color:#9CA3AF}
.chip.on{border-color:#7C3AED;background:#2D1B69;color:#A78BFA}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#7C3AED;color:#fff;border-radius:14px;padding:12px 22px;font-size:13px;font-weight:700;z-index:9999;display:none;white-space:nowrap}
.pbar{height:6px;background:#2D1B69;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#7C3AED,#8B5CF6);border-radius:3px}
.pad{padding:0 14px}
.mt{margin-top:14px}
.ttl{font-weight:900;font-size:16px;margin-bottom:12px}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.dot{width:8px;height:8px;border-radius:50%;background:#8B5CF6;animation:bounce .8s infinite;display:inline-block;margin:2px}
.dot2{animation-delay:.15s}
.dot3{animation-delay:.3s}
</style>
</head>
<body>

<!-- HOME -->
<div id="pg-home" class="page active">
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1">
      <div>
        <div style="font-size:11px;color:rgba(255,255,255,.6)">Хуш омадед!</div>
        <div style="font-size:20px;font-weight:900" id="h-greet">UstodAI 🎓</div>
      </div>
      <button onclick="goPage('settings')" style="background:rgba(255,255,255,.15);border:none;border-radius:50%;width:38px;height:38px;color:#fff;cursor:pointer;font-size:16px">⚙️</button>
    </div>
  </div>
  <div class="pad">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0">
      <div style="background:#1A1030;border-radius:14px;padding:12px;text-align:center;border:1px solid #2D1B69">
        <div style="font-size:20px">💬</div>
        <div style="font-weight:900;font-size:18px;color:#8B5CF6" id="s-q">0</div>
        <div style="font-size:9px;color:#6B7280">Саволҳо</div>
      </div>
      <div style="background:#1A1030;border-radius:14px;padding:12px;text-align:center;border:1px solid #2D1B69">
        <div style="font-size:20px">📝</div>
        <div style="font-weight:900;font-size:18px;color:#10B981" id="s-t">0</div>
        <div style="font-size:9px;color:#6B7280">Тестҳо</div>
      </div>
      <div style="background:#1A1030;border-radius:14px;padding:12px;text-align:center;border:1px solid #2D1B69">
        <div style="font-size:20px">⭐</div>
        <div style="font-weight:900;font-size:18px;color:#F59E0B" id="s-xp">0</div>
        <div style="font-size:9px;color:#6B7280">XP</div>
      </div>
    </div>

    <div style="background:linear-gradient(135deg,#1E0A3C,#2D1B69);border-radius:20px;padding:18px;margin-bottom:18px">
      <div style="font-size:11px;color:#A78BFA;font-weight:800;margin-bottom:4px">⚡ ЗУД ОҒОЗ</div>
      <div style="font-size:18px;font-weight:900;margin-bottom:6px">Савол бипурс!</div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:14px">AI устод ҳар саволро ҷавоб медиҳад</div>
      <button onclick="goPage('chat')" style="background:linear-gradient(135deg,#6D28D9,#7C3AED);border:none;border-radius:12px;padding:10px 20px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit">💬 Чат кун</button>
    </div>

    <div class="ttl">📚 Фанҳо</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px" id="subj-grid"></div>

    <div class="ttl">🕐 Охирин Саволҳо</div>
    <div id="recent-q">
      <div style="text-align:center;padding:24px;color:#6B7280">
        <div style="font-size:40px;margin-bottom:8px">💭</div>
        <div style="font-size:13px">Ҳанӯз савол надодед</div>
      </div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="pg-chat" class="page" style="padding-bottom:120px">
  <div style="background:#1A1030;padding:12px 14px;border-bottom:1px solid #2D1B69;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px">
    <button onclick="goPage('home')" style="background:#2D1B69;border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer;font-size:16px">←</button>
    <div style="flex:1">
      <div style="font-weight:800;font-size:15px">💬 UstodAI</div>
      <div style="font-size:11px;color:#8B5CF6" id="c-subj">Ҳама фанҳо</div>
    </div>
    <button onclick="clearChat()" style="background:#2D1B69;border:none;border-radius:10px;padding:5px 10px;color:#A78BFA;font-size:11px;font-weight:800;cursor:pointer">🗑️ Тоза</button>
  </div>
  <div style="padding:8px 14px;background:#1A1030;border-bottom:1px solid #2D1B69;display:flex;gap:8px;overflow-x:auto">
    <button class="chip on" onclick="setSub('Ҳама',this)">Ҳама</button>
    <button class="chip" onclick="setSub('Математика',this)">🔢 Математика</button>
    <button class="chip" onclick="setSub('Физика',this)">⚗️ Физика</button>
    <button class="chip" onclick="setSub('Химия',this)">🧪 Химия</button>
    <button class="chip" onclick="setSub('Биология',this)">🌿 Биология</button>
    <button class="chip" onclick="setSub('Таърих',this)">📖 Таърих</button>
    <button class="chip" onclick="setSub('Англисӣ',this)">🇬🇧 Англисӣ</button>
  </div>
  <div id="chat-msgs" style="padding:14px;display:flex;flex-direction:column;min-height:300px"></div>
  <div style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1A1030;border-top:1px solid #2D1B69;padding:10px 14px;display:flex;gap:8px;align-items:flex-end">
    <textarea id="c-inp" class="finput" placeholder="Саволатонро нависед..." rows="1" style="resize:none;max-height:100px;min-height:42px;margin:0;flex:1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="send-btn" onclick="send()" style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#6D28D9,#7C3AED);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0">➤</button>
  </div>
</div>

<!-- TESTS -->
<div id="pg-tests" class="page">
  <div style="background:#1A1030;padding:14px;border-bottom:1px solid #2D1B69">
    <div style="font-weight:900;font-size:18px">📝 Тестҳо</div>
  </div>
  <div class="pad mt" id="tests-list"></div>
</div>

<!-- TEST PLAY -->
<div id="pg-testplay" class="page">
  <div style="background:#1A1030;padding:12px 14px;border-bottom:1px solid #2D1B69;display:flex;align-items:center;gap:10px">
    <button onclick="goPage('tests')" style="background:#2D1B69;border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer">←</button>
    <div style="flex:1">
      <div style="font-weight:800" id="tp-ttl">Тест</div>
      <div style="font-size:11px;color:#8B5CF6" id="tp-pr">1/5</div>
    </div>
    <div id="tp-tmr" style="font-weight:900;color:#F59E0B;font-size:16px">5:00</div>
  </div>
  <div style="padding:6px 14px;background:#1A1030;border-bottom:1px solid #2D1B69">
    <div class="pbar"><div class="pfill" id="tp-bar" style="width:20%"></div></div>
  </div>
  <div class="pad mt" id="tp-cont"></div>
</div>

<!-- PROFILE -->
<div id="pg-profile" class="page">
  <div style="background:linear-gradient(135deg,#1E0A3C,#2D1B69,#3730A3);padding:24px 16px 32px;text-align:center">
    <div style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;border:3px solid rgba(255,255,255,.2)">🎓</div>
    <div style="font-size:20px;font-weight:900" id="p-name">Донишҷӯй</div>
    <div style="margin-top:8px"><span style="background:#2D1B69;color:#A78BFA;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px" id="p-lvl">Сатҳи 1</span></div>
  </div>
  <div class="pad mt">
    <div class="card" style="margin:0 0 14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:800">⭐ XP</span>
        <span style="color:#8B5CF6;font-weight:800" id="p-xp">0 XP</span>
      </div>
      <div class="pbar"><div class="pfill" id="p-xpbar" style="width:0%"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      <div style="background:#1A1030;border-radius:14px;padding:14px;border:1px solid #2D1B69;text-align:center">
        <div style="font-size:24px">💬</div>
        <div style="font-weight:900;font-size:20px;color:#8B5CF6" id="p-q">0</div>
        <div style="font-size:10px;color:#6B7280">Саволҳо</div>
      </div>
      <div style="background:#1A1030;border-radius:14px;padding:14px;border:1px solid #2D1B69;text-align:center">
        <div style="font-size:24px">📝</div>
        <div style="font-weight:900;font-size:20px;color:#10B981" id="p-t">0</div>
        <div style="font-size:10px;color:#6B7280">Тестҳо</div>
      </div>
    </div>
    <div class="ttl">🏆 Дастовардҳо</div>
    <div id="achiev"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="pg-settings" class="page">
  <div style="background:#1A1030;padding:12px 14px;border-bottom:1px solid #2D1B69;display:flex;align-items:center;gap:10px">
    <button onclick="goPage('home')" style="background:#2D1B69;border:none;border-radius:50%;width:34px;height:34px;color:#fff;cursor:pointer">←</button>
    <div style="font-weight:900;font-size:18px">⚙️ Танзимот</div>
  </div>
  <div class="pad mt">
    <div class="card" style="margin:0 0 14px">
      <div style="font-weight:800;margin-bottom:8px">👤 Ном</div>
      <input type="text" id="s-name" class="finput" placeholder="Номатонро нависед">
      <button onclick="saveName()" class="btn btn-p">💾 Сақт кун</button>
    </div>
    <button onclick="resetAll()" style="width:100%;background:none;border:2px solid #EF4444;border-radius:14px;padding:14px;color:#EF4444;font-weight:800;cursor:pointer;font-family:inherit">🗑️ Ҳамаро нест кун</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="goPage('home')" id="nav-home"><span class="nav-ico">🏠</span><span class="nav-lbl">Асосӣ</span><div class="nav-dot"></div></button>
  <button class="nav-btn" onclick="goPage('chat')" id="nav-chat"><span class="nav-ico">💬</span><span class="nav-lbl">Чат</span></button>
  <button class="nav-btn" onclick="goPage('tests')" id="nav-tests"><span class="nav-ico">📝</span><span class="nav-lbl">Тестҳо</span></button>
  <button class="nav-btn" onclick="goPage('profile')" id="nav-profile"><span class="nav-ico">👤</span><span class="nav-lbl">Профил</span></button>
</nav>
<div class="toast" id="toast"></div>

<script>
// ===== ТАНЗИМОТ =====
var API_URL = 'https://ustodai.onrender.com'; // Render URL
// ====================

var NAME = localStorage.getItem('u_n') || 'Донишҷӯй';
var ST = JSON.parse(localStorage.getItem('u_s') || '{"q":0,"t":0,"xp":0}');
var HIST = [];
var SUBJ = 'Ҳама';
var BUSY = false;
var CT = null, CQ = 0, CSCORE = 0, TINT = null, TLEFT = 0;

var SUBJS = [
  {i:'🔢',n:'Математика',c:'#1E3A5F',b:'#1D4ED8',d:'Алгебра, геометрия'},
  {i:'⚗️',n:'Физика',c:'#1a2e1a',b:'#059669',d:'Механика, оптика'},
  {i:'🧪',n:'Химия',c:'#3a1a1a',b:'#DC2626',d:'Реаксияҳо'},
  {i:'🌿',n:'Биология',c:'#1a3a1a',b:'#16A34A',d:'Ҳайвонот, наботот'},
  {i:'📖',n:'Таърих',c:'#3a2a1a',b:'#D97706',d:'Тоҷикистон, ҷаҳон'},
  {i:'🌍',n:'Ҷуғрофия',c:'#1a2a3a',b:'#0891B2',d:'Табиат'},
  {i:'📝',n:'Адабиёт',c:'#2a1a3a',b:'#7C3AED',d:'Шеър, наср'},
  {i:'🇬🇧',n:'Англисӣ',c:'#1a1a3a',b:'#4F46E5',d:'Grammar'}
];

var TESTS = [
  {id:1,ttl:'Математика',i:'🔢',tm:300,qs:[
    {q:'2 × 8 = ?',o:['14','16','18','20'],c:1},
    {q:'√144 = ?',o:['11','12','13','14'],c:1},
    {q:'15% аз 200 = ?',o:['25','30','35','40'],c:1},
    {q:'7² = ?',o:['42','47','49','56'],c:2},
    {q:'0.5 × 0.5 = ?',o:['0.1','0.25','0.5','1'],c:1}
  ]},
  {id:2,ttl:'Физика',i:'⚗️',tm:300,qs:[
    {q:'Суръат чист?',o:['m/s','kg','N','J'],c:0},
    {q:'F = m × ?',o:['v','a','t','s'],c:1},
    {q:'Нури суръат км/с?',o:['100,000','200,000','300,000','400,000'],c:2},
    {q:'1 Ньютон = ?',o:['kg×m/s','kg×m/s²','kg/s','m/s²'],c:1}
  ]},
  {id:3,ttl:'Таърихи TJ',i:'📖',tm:300,qs:[
    {q:'TJ кай мустақил шуд?',o:['1989','1990','1991','1992'],c:2},
    {q:'Пойтахти TJ?',o:['Хуҷанд','Кӯлоб','Душанбе','Бохтар'],c:2},
    {q:'TJ дар кадом қитъа?',o:['Африқо','Аврупо','Осиё','Америка'],c:2},
    {q:'Забони давлатии TJ?',o:['Русӣ','Ӯзбекӣ','Тоҷикӣ','Форсӣ'],c:2}
  ]}
];

function init() {
  document.getElementById('h-greet').textContent = 'Салом, ' + NAME + '! 🎓';
  updST(); buildSubjs(); buildTests(); addWelcome();
}

function goPage(id) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  var pg = document.getElementById('pg-' + id);
  if(pg) pg.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.remove('active');
    var d = b.querySelector('.nav-dot');
    if(d) d.remove();
  });
  var nb = document.getElementById('nav-' + id);
  if(nb) { nb.classList.add('active'); var dot=document.createElement('div'); dot.className='nav-dot'; nb.appendChild(dot); }
  if(id==='profile') updProfile();
  if(id==='settings') document.getElementById('s-name').value = NAME;
}

function toast(m,c) {
  var t=document.getElementById('toast');
  t.textContent=m; t.style.background=c||'#7C3AED'; t.style.display='block';
  setTimeout(function(){t.style.display='none';},2500);
}

function saveName() {
  var n=document.getElementById('s-name').value.trim();
  if(!n)return;
  NAME=n; localStorage.setItem('u_n',n);
  document.getElementById('h-greet').textContent='Салом, '+n+'! 🎓';
  toast('✅ Сақт шуд!');
}

function resetAll() {
  if(confirm('Ҳамаро нест кунем?')){localStorage.clear();location.reload();}
}

function updST() {
  document.getElementById('s-q').textContent=ST.q;
  document.getElementById('s-t').textContent=ST.t;
  document.getElementById('s-xp').textContent=ST.xp;
}

function saveST() { localStorage.setItem('u_s',JSON.stringify(ST)); updST(); }

function buildSubjs() {
  var g=document.getElementById('subj-grid'); var h='';
  SUBJS.forEach(function(s){
    h+='<div style="background:'+s.c+';border-radius:16px;padding:14px;border:1px solid '+s.b+';cursor:pointer;text-align:center" onclick="startSubj(\''+s.n+'\')">';
    h+='<div style="font-size:32px;margin-bottom:6px">'+s.i+'</div>';
    h+='<div style="font-weight:800;font-size:13px">'+s.n+'</div>';
    h+='<div style="font-size:10px;color:#9CA3AF;margin-top:3px">'+s.d+'</div></div>';
  });
  g.innerHTML=h;
}

function startSubj(n) { SUBJ=n; document.getElementById('c-subj').textContent=n; goPage('chat'); }

function setSub(s,btn) {
  SUBJ=s; document.getElementById('c-subj').textContent=s==='Ҳама'?'Ҳама фанҳо':s;
  document.querySelectorAll('#pg-chat .chip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
}

function addWelcome() {
  var c=document.getElementById('chat-msgs');
  var d=document.createElement('div'); d.className='msg ai';
  d.innerHTML='<div style="font-size:11px;color:#8B5CF6;font-weight:800;margin-bottom:6px">🎓 UstodAI</div>';
  d.innerHTML+='Салом! Ман устоди ҳушманди шумо ҳастам. Ҳар саволе ки доред — бипурсед! 📚<br><br>';
  d.innerHTML+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
  ['2+2 чист?','H2O чист?','TJ кай мустақил шуд?','Hello нависед'].forEach(function(q){
    d.innerHTML+='<button onclick="quickQ(\''+q+'\')" style="background:#2D1B69;border:none;border-radius:10px;padding:6px 10px;color:#A78BFA;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">'+q+'</button>';
  });
  d.innerHTML+='</div>';
  c.appendChild(d);
}

function quickQ(q) { document.getElementById('c-inp').value=q; send(); }

async function send() {
  if(BUSY)return;
  var inp=document.getElementById('c-inp');
  var txt=inp.value.trim(); if(!txt)return;
  inp.value=''; addMsg(txt,'user');
  HIST.push({role:'user',content:txt});
  ST.q++; ST.xp+=5; saveST();
  BUSY=true; document.getElementById('send-btn').disabled=true;
  var typ=addTyp();
  try {
    var res=await fetch(API_URL+'/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:HIST, subject:SUBJ})
    });
    var data=await res.json();
    if(data.error) throw new Error(data.error);
    HIST.push({role:'assistant',content:data.text});
    typ.remove(); addMsg(data.text,'ai'); addRQ(txt);
    ST.xp+=10; saveST();
  } catch(e) {
    typ.remove(); addMsg('❌ Хатогӣ юз дод. Сервер кор намекунад.','ai');
  }
  BUSY=false; document.getElementById('send-btn').disabled=false;
}

function addMsg(txt,role) {
  var c=document.getElementById('chat-msgs');
  var d=document.createElement('div'); d.className='msg '+role;
  if(role==='ai') d.innerHTML='<div style="font-size:11px;color:#8B5CF6;font-weight:800;margin-bottom:6px">🎓 UstodAI</div>'+txt.replace(/\n/g,'<br>');
  else d.textContent=txt;
  c.appendChild(d); c.scrollTop=c.scrollHeight; return d;
}

function addTyp() {
  var c=document.getElementById('chat-msgs');
  var d=document.createElement('div'); d.className='msg ai';
  d.innerHTML='<div style="font-size:11px;color:#8B5CF6;font-weight:800;margin-bottom:6px">🎓 UstodAI</div><span class="dot"></span><span class="dot dot2"></span><span class="dot dot3"></span>';
  c.appendChild(d); c.scrollTop=c.scrollHeight; return d;
}

function clearChat() { HIST=[]; document.getElementById('chat-msgs').innerHTML=''; addWelcome(); }

function addRQ(q) {
  var r=document.getElementById('recent-q');
  var f=r.querySelector('[style*="text-align:center"]');
  if(f) r.innerHTML='';
  var d=document.createElement('div');
  d.style.cssText='background:#1A1030;border-radius:12px;padding:10px 12px;margin-bottom:8px;border:1px solid #2D1B69;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px';
  d.innerHTML='<span style="color:#8B5CF6">💬</span><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+q+'</span>';
  d.onclick=function(){document.getElementById('c-inp').value=q;goPage('chat');};
  r.insertBefore(d,r.firstChild);
  if(r.children.length>5) r.removeChild(r.lastChild);
}

function buildTests() {
  var g=document.getElementById('tests-list'); var h='';
  TESTS.forEach(function(t){
    h+='<div style="background:#1A1030;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #2D1B69;cursor:pointer" onclick="startTest('+t.id+')">';
    h+='<div style="display:flex;align-items:center;gap:12px">';
    h+='<div style="width:48px;height:48px;border-radius:14px;background:#2D1B69;display:flex;align-items:center;justify-content:center;font-size:24px">'+t.i+'</div>';
    h+='<div><div style="font-weight:800;font-size:15px">'+t.ttl+'</div>';
    h+='<div style="font-size:12px;color:#6B7280">'+t.qs.length+' савол</div></div>';
    h+='<span style="margin-left:auto;color:#A78BFA;font-size:20px">›</span></div></div>';
  });
  g.innerHTML=h;
}

function startTest(id) {
  CT=TESTS.filter(function(t){return t.id===id;})[0];
  CQ=0; CSCORE=0; TLEFT=CT.tm;
  document.getElementById('tp-ttl').textContent=CT.i+' '+CT.ttl;
  goPage('testplay'); showQ(); startTmr();
}

function showQ() {
  if(CQ>=CT.qs.length){finishT();return;}
  var q=CT.qs[CQ];
  var pct=Math.round(((CQ+1)/CT.qs.length)*100);
  document.getElementById('tp-pr').textContent=(CQ+1)+'/'+CT.qs.length;
  document.getElementById('tp-bar').style.width=pct+'%';
  var ABC=['A','B','C','D']; var h='';
  h+='<div style="font-size:12px;color:#8B5CF6;font-weight:800;margin-bottom:10px">Савол '+(CQ+1)+'</div>';
  h+='<div style="font-size:18px;font-weight:800;margin-bottom:20px;line-height:1.5">'+q.q+'</div>';
  h+='<div style="display:flex;flex-direction:column;gap:10px">';
  q.o.forEach(function(opt,i){
    h+='<button onclick="ansQ('+i+')" style="background:#1A1030;border:2px solid #2D1B69;border-radius:14px;padding:14px 16px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit;width:100%">';
    h+='<span style="color:#8B5CF6;font-weight:800;margin-right:8px">'+ABC[i]+'.</span>'+opt+'</button>';
  });
  h+='</div>';
  document.getElementById('tp-cont').innerHTML=h;
}

function ansQ(idx) {
  var q=CT.qs[CQ];
  var btns=document.querySelectorAll('#tp-cont button');
  btns.forEach(function(b){b.disabled=true;});
  btns[q.c].style.borderColor='#10B981';
  if(idx!==q.c) btns[idx].style.borderColor='#EF4444';
  if(idx===q.c){CSCORE++;toast('✅ Дуруст!','#059669');}
  else toast('❌ Нодуруст!','#DC2626');
  CQ++; setTimeout(showQ,1000);
}

function finishT() {
  clearInterval(TINT);
  var pct=Math.round((CSCORE/CT.qs.length)*100);
  ST.t++; ST.xp+=CSCORE*20; saveST();
  var ico=pct>=80?'🏆':pct>=60?'👍':'📚';
  var clr=pct>=80?'#10B981':pct>=60?'#F59E0B':'#EF4444';
  var tid=CT.id;
  document.getElementById('tp-cont').innerHTML=
    '<div style="text-align:center;padding:20px">'+
    '<div style="font-size:72px;margin-bottom:16px">'+ico+'</div>'+
    '<div style="font-size:28px;font-weight:900;margin-bottom:8px;color:'+clr+'">'+pct+'%</div>'+
    '<div style="font-size:16px;color:#9CA3AF;margin-bottom:20px">'+CSCORE+'/'+CT.qs.length+' дуруст</div>'+
    '<div style="font-size:14px;color:#8B5CF6;margin-bottom:24px">+'+CSCORE*20+' XP</div>'+
    '<button onclick="startTest('+tid+')" class="btn btn-p">🔄 Боз кӯшиш</button>'+
    '<button onclick="goPage(\'tests\')" class="btn btn-o">← Тестҳо</button></div>';
}

function startTmr() {
  clearInterval(TINT);
  TINT=setInterval(function(){
    TLEFT--;
    var m=Math.floor(TLEFT/60), s=TLEFT%60;
    var el=document.getElementById('tp-tmr');
    if(el) el.textContent=m+':'+(s<10?'0':'')+s;
    if(TLEFT<=30&&el) el.style.color='#EF4444';
    if(TLEFT<=0){clearInterval(TINT);finishT();}
  },1000);
}

function updProfile() {
  document.getElementById('p-name').textContent=NAME;
  document.getElementById('p-q').textContent=ST.q;
  document.getElementById('p-t').textContent=ST.t;
  var lvl=Math.floor(ST.xp/100)+1, xin=ST.xp%100;
  document.getElementById('p-lvl').textContent='Сатҳи '+lvl;
  document.getElementById('p-xp').textContent=ST.xp+' XP';
  document.getElementById('p-xpbar').style.width=xin+'%';
  buildAch();
}

function buildAch() {
  var el=document.getElementById('achiev'); if(!el)return;
  var list=[
    {i:'🌟',n:'Аввалин қадам',d:'Аввалин савол',done:ST.q>=1},
    {i:'💬',n:'Фаъол',d:'10 савол',done:ST.q>=10},
    {i:'📝',n:'Тестчӣ',d:'1 тест',done:ST.t>=1},
    {i:'⭐',n:'XP 100',d:'100 XP',done:ST.xp>=100},
    {i:'🏆',n:'Устод',d:'50 савол',done:ST.q>=50}
  ];
  var h='';
  list.forEach(function(a){
    h+='<div style="background:'+(a.done?'#1A2D1A':'#1A1030')+';border-radius:14px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;border:1px solid '+(a.done?'#059669':'#2D1B69')+'">';
    h+='<span style="font-size:28px;opacity:'+(a.done?1:.3)+'">'+a.i+'</span>';
    h+='<div><div style="font-weight:700;color:'+(a.done?'#fff':'#6B7280')+'">'+a.n+'</div>';
    h+='<div style="font-size:11px;color:#6B7280">'+a.d+'</div></div>';
    h+='<span style="margin-left:auto">'+(a.done?'✅':'🔒')+'</span></div>';
  });
  el.innerHTML=h;
}

init();
</script>
</body>
</html>
